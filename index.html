<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>감자 쓰다듬기</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1 class="title">감자 쓰다듬기</h1>

      <div class="image-area" id="imageArea">
        <!-- 감자 사진 파일명을 gamja.jpg로 해서 images 폴더에 넣어주세요 -->
        <img id="gamjaImg" src="images/g1.jpg" alt="강아지 감자" />
        <div id="heartEffect">❤️</div>
      </div>

      <div class="status-box">
        <p id="statusText">감자의 머리를 부드럽게 쓰다듬어 주세요!</p>
        <div class="love-bar-container">
          <div id="loveBar"></div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
